[General]
# Path to your Lightroom backups directory.
# Example (Mac): /Users/username/Pictures/Lightroom/Backups
# Example (Windows): C:\Users\username\Pictures\Lightroom\Backups
backup_dir = /path/to/your/lightroom/backups

# Maximum age of backups in days.
# Backups older than this will be deleted (unless they are protected by other rules).
max_age_days = 60

# If True, no files will be actually deleted. The script will only print/log what it WOULD delete.
# Highly recommended to keep this True when first testing.
# Set to False to enable actual deletion.
dry_run = True

# Language for logging and emails.
# Options: en (English), nl (Dutch)
language = en

[Retention]
# Smart Retention Policy settings.

# Number of days to keep ALL daily backups.
# Example: 7 means keep every backup from the last week.
keep_daily_days = 7

# Number of days to keep ONE backup per week.
# This applies to backups older than 'keep_daily_days' but younger than this value.
# Example: 60 means keep one weekly backup for the last 2 months.
# Backups falling in this window that are NOT the selected weekly backup will be deleted.
keep_weekly_days = 60

# Minimum number of backups to keep, regardless of age.
# Ensures that you always have at least X backups, even if they are older than max_age_days.
min_backups = 5

[Email]
# Set to True to enable email notifications, False to disable.
send_email = False

# SMTP Server settings for sending emails.
# Example for Gmail: smtp.gmail.com
smtp_server = smtp.example.com

# SMTP Port.
# Example for Gmail SSL: 465
smtp_port = 465

# Your email address used for logging in to the SMTP server.
smtp_user = your_email@example.com

# Your email password or App Password.
# For Gmail, you likely need to generate an "App Password" if 2FA is enabled.
smtp_password = your_password_here

# The email address where the report should be sent.
email_to = recipient@example.com

# The email address that appears as the sender.
email_from = sender@example.com

[Thresholds]
# Minimum free disk space required in Gigabytes (GB).
# If free space falls below this, a warning will be logged/emailed.
min_free_space_gb = 10

# Alert if no backup has been created in this many days.
# Use this to detect if your backup process itself is broken.
no_backup_alert_days = 31
