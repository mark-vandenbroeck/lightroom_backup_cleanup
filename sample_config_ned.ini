[General]
# Pad naar je Lightroom backup map.
# Voorbeeld (Mac): /Users/gebruikersnaam/Pictures/Lightroom/Backups
# Voorbeeld (Windows): C:\Users\gebruikersnaam\Pictures\Lightroom\Backups
backup_dir = /pad/naar/je/lightroom/backups

# Maximale ouderdom van backups in dagen.
# Backups ouder dan dit worden verwijderd (tenzij beschermd door andere regels).
max_age_days = 60

# Indien True, worden er geen bestanden daadwerkelijk verwijderd. Het script logt alleen wat het ZOU verwijderen.
# Het wordt sterk aanbevolen dit op True te laten staan tijdens het testen.
# Zet op False om het verwijderen te activeren.
dry_run = True

[Retention]
# Instellingen voor Slim Bewaarbeleid.

# Aantal dagen om ALLE dagelijkse backups te bewaren.
# Voorbeeld: 7 betekent dat elke backup van de afgelopen week bewaard blijft.
keep_daily_days = 7

# Aantal dagen om ÉÉN backup per week te bewaren.
# Dit geldt voor backups ouder dan 'keep_daily_days' maar jonger dan deze waarde.
# Voorbeeld: 60 betekent dat er één wekelijkse backup wordt bewaard voor de laatste 2 maanden.
# Backups in deze periode die NIET de geselecteerde wekelijkse backup zijn, worden verwijderd.
keep_weekly_days = 60

[Email]
# Zet op True om e-mailmeldingen in te schakelen, False om uit te schakelen.
send_email = False

# SMTP Server instellingen voor het verzenden van e-mails.
# Voorbeeld voor Gmail: smtp.gmail.com
smtp_server = smtp.example.com

# SMTP Poort.
# Voorbeeld voor Gmail SSL: 465
smtp_port = 465

# Je e-mailadres dat gebruikt wordt om in te loggen op de SMTP server.
smtp_user = jouw_email@example.com

# Je e-mail wachtwoord of App Password.
# Voor Gmail moet je waarschijnlijk een "App Password" genereren als 2FA aan staat.
smtp_password = jouw_wachtwoord_hier

# Het e-mailadres waar het rapport naartoe gestuurd moet worden.
email_to = ontvanger@example.com

# Het e-mailadres dat als afzender verschijnt.
email_from = afzender@example.com

[Thresholds]
# Minimale vrije schijfruimte in Gigabytes (GB).
# Als de vrije ruimte hieronder zakt, wordt er een waarschuwing gelogd/gemaild.
min_free_space_gb = 10

# Alarm als er in zoveel dagen geen backup is gemaakt.
# Gebruik dit om te detecteren of je backup proces zelf stuk is.
no_backup_alert_days = 31
